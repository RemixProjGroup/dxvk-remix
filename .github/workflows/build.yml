name: Build
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'

jobs:
  build-windows:
    runs-on: windows-2022
    strategy:
      matrix:
        include:
          - build-flavour: debug
            output-subdir: _Comp64Debug
          - build-flavour: debugoptimized
            output-subdir: _Comp64DebugOptimized
          - build-flavour: release
            output-subdir: _Comp64Release
    steps:
    - name: Setup variables
      uses: actions/github-script@v7
      with:
        script: core.exportVariable('GITHUB_SHA_SHORT', context.sha.substring(0, 7))
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.branch }}
        submodules: recursive
    - name: Setup Meson
      run: pip install meson==1.1.0
    - name: Build
      shell: pwsh
      run: |
        Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope Process
        . .\build_common.ps1
        PerformBuild -BuildFlavour ${{matrix.build-flavour}} -BuildSubDir ${{matrix.output-subdir}} -Backend ninja -EnableTracy false copy_output

    - name: Build NvFlow (PhysX Flow)
      shell: powershell
      run: |
        Push-Location submodules\PhysX\flow

        # Step 1: Run build.bat so Premake generates the vcxproj files.
        # The first MSBuild pass inside build.bat will fail on C4756/WX —
        # that is expected. We only need the generated project files.
        Write-Host "Running build.bat to generate project files..."
        cmd /c "build.bat" | Out-Host

        # Step 2: Patch all generated vcxproj files to disable TreatWarningAsError.
        # C4756 (overflow in constant arithmetic) in EmitterMesh.cpp line 465 is
        # caused by NvFlowFloat4{ INFINITY, INFINITY, INFINITY, INFINITY } which
        # MSVC treats as overflow. With /WX this becomes a fatal error.
        Write-Host "Patching vcxproj files to disable TreatWarningAsError..."
        $patched = 0
        Get-ChildItem -Path "_compiler\vs2022" -Recurse -Filter "*.vcxproj" |
          ForEach-Object {
            $content = Get-Content $_.FullName -Raw
            $new = $content `
              -replace '<TreatWarningAsError>true</TreatWarningAsError>',
                       '<TreatWarningAsError>false</TreatWarningAsError>'
            if ($content -ne $new) {
              Set-Content -Path $_.FullName -Value $new -NoNewline
              Write-Host "  Patched: $($_.Name)"
              $patched++
            }
          }
        Write-Host "$patched file(s) patched."

        # Step 3: Rebuild with the patched projects. Release config, x64.
        Write-Host "Building nvflow.sln (release|x64)..."
        $msbuild = & "${env:ProgramFiles}\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\MSBuild.exe" `
          "_compiler\vs2022\nvflow.sln" `
          /p:Configuration=release `
          /p:Platform=x64 `
          /m `
          /nologo
        $exitCode = $LASTEXITCODE

        Pop-Location

        if ($exitCode -ne 0) {
          Write-Error "!!! Failure while building nvflow !!!"
          exit $exitCode
        }
        Write-Host "nvflow build succeeded."

    - name: Copy NvFlow DLLs
      shell: powershell
      run: |
        $flowBuildDir = "submodules\PhysX\flow\_build\windows-x86_64\release"
        $outputDir    = "_output"

        if (-not (Test-Path $outputDir)) {
          New-Item -ItemType Directory -Path $outputDir | Out-Null
        }

        $dlls = @("nvflow.dll", "nvflowext.dll")
        foreach ($dll in $dlls) {
          $src = Join-Path $flowBuildDir $dll
          if (Test-Path $src) {
            Copy-Item -Path $src -Destination $outputDir -Force
            Write-Host "Copied: $dll -> $outputDir"
          } else {
            Write-Error "Expected DLL not found after build: $src"
            exit 1
          }
        }
        Write-Host "NvFlow DLLs copied successfully."
    - name: Copy readme
      run: copy artifacts_readme.txt _output
    - name: Upload x64 binaries
      uses: actions/upload-artifact@v4
      with:
        name: rtx-remix-for-x64-games-${{github.run_number}}-${{env.GITHUB_SHA_SHORT}}-${{matrix.build-flavour}}
        path: |
          _output\*.dll
          _output\*.pdb
          _output\*.txt
          _output\usd\*
    - name: Move DXVK
      shell: pwsh
      run: |
        mkdir _output\.trex
        Move-Item -Path _output\*.dll -Destination _output\.trex\
        Move-Item -Path _output\*.pdb -Destination _output\.trex\
        Move-Item -Path _output\usd -Destination _output\.trex\usd
    - name: Build Bridge
      shell: pwsh
      run: |
        Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope Process
        pushd bridge
        . .\build_bridge_${{matrix.build-flavour}}.bat
        popd
    - name: Copy Bridge
      shell: pwsh
      run: |
        Copy-Item -Recurse -Path bridge\_output\* -Destination _output\ -Force
    - name: Upload x86 binaries
      uses: actions/upload-artifact@v4
      with:
        name: rtx-remix-for-x86-games-${{github.run_number}}-${{env.GITHUB_SHA_SHORT}}-${{matrix.build-flavour}}
        include-hidden-files: true
        path: |
          _output\*.dll
          _output\*.exe
          _output\*.pdb
          _output\*.txt
          _output\.trex\*.dll
          _output\.trex\*.exe
          _output\.trex\*.pdb
          _output\.trex\usd\*
